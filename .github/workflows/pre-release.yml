name: Upload to Test PyPI

on:
  push:
    branches:
      - release/*

permissions:
  contents: read

jobs:
  test-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v4
        with:
          enable-cache: true

      - name: Install build & twine
        run: uv pip install --system build twine

      - name: Sync project dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Build distribution
        run: python -m build --sdist --wheel

      - name: Publish package to Test PyPI
        env:
          TWINE_USERNAME: "__token__"
          TWINE_PASSWORD: "${{ secrets.TEST_PYPI_TOKEN }}"
        run: twine upload --skip-existing --repository-url https://test.pypi.org/legacy/ dist/*
